server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    # Лог-файлы — в stdout/stderr, чтобы их подбирал `docker logs`
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

     # Защита: запрет на доступ к скрытым файлам (.env, .git и т.п.)
     location ~ /\. {
        deny all;
     }

     # Запрет на любые .php-файлы вне public/index.php
     location ~ \.php$ {
        return 404;
     }

     # Все запросы — на front controller
     location / {
        try_files $uri $uri/ /index.php?$query_string;
     }

     location = /index.php {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Для больших batch-запросов (массовая рассылка)
        fastcgi_read_timeout 60s;
        client_max_body_size 16M;
     }

}